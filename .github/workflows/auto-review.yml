name: Automated Bioconductor Package Review

# Standalone workflow that only generates a review, without running the full
# build/check pipeline. Useful for re-running the review after code changes.
#
# Triggers:
#   - Issue comment starting with "@biocreview" — runs a review-only pass.
#     Optionally include a `Remotes:` line to pre-install co-dependent packages
#     that have not yet been accepted into Bioconductor/CRAN:
#
#       @biocreview
#       Remotes: waldronlab/imageTCGAutils, waldronlab/anotherPkg
#
#   - Manual trigger via GitHub Actions UI (workflow_dispatch)

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      repo:
        description: "Target package repo (owner/repo)"
        required: true
        type: string
      ref:
        description: "Branch/tag/SHA to review"
        required: false
        default: "devel"
        type: string
      issue_number:
        description: "GitHub issue number to post review to (optional)"
        required: false
        type: string
      remotes:
        description: |
          Comma-separated list of GitHub repos (owner/repo) to pre-install as
          co-dependent packages not yet on Bioconductor/CRAN.
          Example: waldronlab/imageTCGAutils, waldronlab/anotherPkg
        required: false
        type: string

env:
  R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
  GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
  CRAN: https://p3m.dev/cran/__linux__/noble/latest
  BIOC_VERSION: devel
  REVIEW_MODEL: "GitHub Copilot (automated reviewer)"

jobs:
  auto-review:
    # For issue_comment trigger: only run when comment starts with "@biocreview"
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       startsWith(github.event.comment.body, '@biocreview'))

    runs-on: ubuntu-24.04
    container: bioconductor/bioconductor_docker:devel

    steps:
      - name: Resolve target repo (issue_comment trigger)
        id: resolve
        uses: actions/github-script@v8
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('repo', '${{ inputs.repo }}');
              core.setOutput('ref', '${{ inputs.ref || "devel" }}');
              core.setOutput('issue', '${{ inputs.issue_number || "" }}');
              core.setOutput('remotes', '${{ inputs.remotes || "" }}');
            } else {
              // Parse issue body for GitHub URL
              const body = context.payload.issue.body || "";
              const match = body.match(/github\.com\/([a-zA-Z0-9-]+\/[a-zA-Z0-9._-]+)/);
              if (!match) {
                core.setFailed("No GitHub repository URL found in the issue body.");
                return;
              }
              core.setOutput('repo', match[1]);
              core.setOutput('ref', 'devel');
              core.setOutput('issue', String(context.issue.number));

              // Parse optional Remotes: line from the @biocreview comment body.
              // Accepts both inline and next-line formats:
              //   @biocreview Remotes: owner/repo1, owner/repo2
              //   @biocreview\nRemotes: owner/repo1
              const commentBody = context.payload.comment.body || '';
              const remotesMatch = commentBody.match(/^Remotes:\s*(.+)$/im);
              core.setOutput('remotes', remotesMatch ? remotesMatch[1].trim() : '');
            }

      - name: Checkout target package
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.resolve.outputs.repo }}
          ref: ${{ steps.resolve.outputs.ref }}
          path: package

      - name: Checkout BiocReviews (for generate_review.R)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          path: BiocReviews

      - name: Install co-dependent Remotes
        # Pre-installs GitHub-only packages that are being submitted to
        # Bioconductor simultaneously and are not yet on CRAN/Bioconductor.
        # Specified via `Remotes:` in the @biocreview comment, e.g.:
        #   @biocreview
        #   Remotes: waldronlab/imageTCGAutils, waldronlab/anotherPkg
        if: steps.resolve.outputs.remotes != ''
        run: |
          deps <- trimws(strsplit("${{ steps.resolve.outputs.remotes }}", ",\\s*")[[1L]])
          deps <- deps[nzchar(deps)]
          message("Installing co-dependent remotes: ", paste(deps, collapse = ", "))
          remotes::install_github(deps, upgrade = "never")
        shell: Rscript {0}

      - name: Install review dependencies
        run: |
          BiocManager::install(
            c("BiocCheck", "rcmdcheck", "covr", "jsonlite"),
            ask = FALSE, update = FALSE
          )
          remotes::install_deps(
            "package",
            dependencies = TRUE,
            repos = BiocManager::repositories()
          )
        shell: Rscript {0}

      - name: R CMD check
        continue-on-error: true
        run: |
          check <- rcmdcheck::rcmdcheck(
            "package",
            args = "--no-manual",
            error_on = "never",
            check_dir = "check"
          )
          sink("check_results.txt")
          print(check)
          sink()
        shell: Rscript {0}

      - name: Test coverage
        continue-on-error: true
        run: |
          cov <- tryCatch(
            covr::package_coverage(
              "package",
              quiet = FALSE,
              clean = FALSE,
              type = "all"
            ),
            error = function(e) NULL
          )
          if (!is.null(cov)) {
            library(jsonlite)
            cov_list <- covr::coverage_to_list(cov)
            write_json(cov_list, "coverage.json", auto_unbox = TRUE, pretty = TRUE)
            pct <- round(covr::percent_coverage(cov), 2)
            writeLines(paste0("Total Coverage: ", pct, "%"), "coverage_summary.txt")
          }
        shell: Rscript {0}

      - name: Install GPG
        run: sudo apt-get update && sudo apt-get install -y gpg

      - name: Run BiocCheck
        continue-on-error: true
        run: |
          sink("bioccheck_results.txt")
          BiocCheck::BiocCheck(
            "package",
            `quit-with-status` = TRUE,
            `no-check-bioc-help` = TRUE
          )
          sink()
        shell: Rscript {0}

      - name: Generate automated review
        run: |
          Rscript BiocReviews/generate_review.R \
            "package" \
            "check_results.txt" \
            "bioccheck_results.txt" \
            "coverage.json" \
            "${{ steps.resolve.outputs.issue }}" \
            "automated_review.md"

      - name: Upload automated review artifact
        uses: actions/upload-artifact@v4
        with:
          name: automated-review
          path: |
            automated_review.md
            check_results.txt
            bioccheck_results.txt
            coverage_summary.txt
          retention-days: 30

      - name: Post review to issue
        if: steps.resolve.outputs.issue != ''
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const review = fs.existsSync('automated_review.md')
              ? fs.readFileSync('automated_review.md', 'utf8')
              : '_Review generation failed — check workflow logs._';

            const cov = fs.existsSync('coverage_summary.txt')
              ? fs.readFileSync('coverage_summary.txt', 'utf8')
              : '';

            const covLine = cov ? `\n\n**Coverage:** ${cov}` : '';

            const body = [
              '### Automated Package Review',
              '',
              '> Generated by the BiocReviews automated reviewer based on',
              '> [Bioconductor contribution guidelines](https://contributions.bioconductor.org).',
              '> This is a preliminary automated review — a human reviewer will follow up.',
              covLine,
              '',
              review
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: Number('${{ steps.resolve.outputs.issue }}'),
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
