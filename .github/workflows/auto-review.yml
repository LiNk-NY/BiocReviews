name: Automated Bioconductor Package Review

on:
  workflow_run:
    # IMPORTANT: This workflow name must exactly match the 'name' field in build-check.yml
    # If you rename build-check.yml's workflow, update this reference accordingly
    workflows: ["R CMD build and check"]
    types: [completed]
  workflow_dispatch:
    inputs:
      repo:
        description: "Target package repo (owner/repo)"
        required: true
        type: string
      ref:
        description: "Branch/tag/SHA to review"
        required: false
        default: "devel"
        type: string
      issue_number:
        description: "GitHub issue number to post review to (optional)"
        required: false
        type: string

permissions:
  contents: read
  actions: read
  issues: write

env:
  GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
  REVIEW_MODEL: "GitHub Copilot (automated reviewer)"

jobs:
  auto-review:
    if: |
      github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_run'
    runs-on: ubuntu-24.04
    container: bioconductor/bioconductor_docker:devel

    steps:
      - name: Resolve execution mode
        id: mode
        uses: actions/github-script@v8
        with:
          script: |
            if (context.eventName === 'workflow_run') {
              core.setOutput('kind', 'workflow_run');
              core.setOutput('run_id', String(context.payload.workflow_run.id));
              return;
            }
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('kind', 'manual');
              return;
            }
            core.setOutput('kind', 'workflow_run');

      - name: Download build-check metadata artifact
        if: steps.mode.outputs.kind == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: build-check-metadata
          path: build_meta
          run-id: ${{ steps.mode.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download build-check results artifact
        if: steps.mode.outputs.kind == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: build-check-results
          path: build_results
          run-id: ${{ steps.mode.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve target submission
        id: resolve
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');

            if (context.eventName === 'workflow_run') {
              // Verify metadata files exist
              if (!fs.existsSync('build_meta/target_repo.txt') ||
                  !fs.existsSync('build_meta/target_ref.txt') ||
                  !fs.existsSync('build_meta/issue_number.txt')) {
                core.setFailed('Metadata artifact missing required files');
                return;
              }
              const repo = fs.readFileSync('build_meta/target_repo.txt', 'utf8').trim();
              const ref = fs.readFileSync('build_meta/target_ref.txt', 'utf8').trim() || 'devel';
              const issue = fs.readFileSync('build_meta/issue_number.txt', 'utf8').trim();
              core.setOutput('repo', repo);
              core.setOutput('ref', ref);
              core.setOutput('issue', issue);
              core.setOutput('check_file', 'build_results/check_results.txt');
              core.setOutput('bioccheck_file', 'build_results/bioccheck_results.txt');
              core.setOutput('coverage_file', 'build_results/coverage.json');
              return;
            }

            if (context.eventName === 'workflow_dispatch') {
              const repo = '${{ inputs.repo }}';
              const ref = '${{ inputs.ref }}';
              const issue = '${{ inputs.issue_number }}';
              core.setOutput('repo', repo);
              core.setOutput('ref', ref || 'devel');
              core.setOutput('issue', issue || '');
              core.setOutput('check_file', '');
              core.setOutput('bioccheck_file', '');
              core.setOutput('coverage_file', '');
              return;
            }

            core.setFailed('Unexpected event context. Use workflow_dispatch for manual runs.');

      - name: Checkout target package
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.resolve.outputs.repo }}
          ref: ${{ steps.resolve.outputs.ref }}
          path: package

      - name: Checkout BiocReviews (for generate_review.R)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          path: BiocReviews

      - name: Install review dependencies
        run: |
          BiocManager::install(c("jsonlite"), ask = FALSE, update = FALSE)
        shell: Rscript {0}

      - name: Generate automated review
        run: |
          Rscript BiocReviews/generate_review.R \
            "package" \
            "${{ steps.resolve.outputs.check_file }}" \
            "${{ steps.resolve.outputs.bioccheck_file }}" \
            "${{ steps.resolve.outputs.coverage_file }}" \
            "${{ steps.resolve.outputs.issue }}" \
            "automated_review.md" \
            "${{ env.REVIEW_MODEL }}"

      - name: Upload automated review artifact
        uses: actions/upload-artifact@v4
        with:
          name: automated-review
          path: automated_review.md
          retention-days: 30

      - name: Post review to issue
        if: steps.resolve.outputs.issue != ''
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const review = fs.existsSync('automated_review.md')
              ? fs.readFileSync('automated_review.md', 'utf8')
              : '_Review generation failed — check workflow logs._';

            await github.rest.issues.createComment({
              issue_number: Number('${{ steps.resolve.outputs.issue }}'),
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Automated Package Review\n\n${review}`
            });
