name: Build and Check Pipeline
# IMPORTANT: This workflow name is referenced by auto-review.yml's workflow_run trigger
# If you rename this workflow, update the reference in auto-review.yml accordingly

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
  GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
  CRAN: https://p3m.dev/cran/__linux__/noble/latest
  BIOC_VERSION: devel

jobs:
  build-check:
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'AI review') ||
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '@biocreview'))
    runs-on: ubuntu-24.04
    container: bioconductor/bioconductor_docker:devel

    steps:
      - name: Resolve submission metadata from issue body
        id: resolve
        uses: actions/github-script@v8
        with:
          script: |
            const body = context.payload.issue.body || "";

            const repoMatch = body.match(/^[\-\*\s]*Repository:\s*https?:\/\/github\.com\/([A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+)\/?\s*$/im)
              || body.match(/github\.com\/([A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+)/);
            if (!repoMatch) {
              core.setFailed("No valid Repository URL found. Use 'Repository: https://github.com/owner/repo' in the issue body.");
              return;
            }

            const refMatch = body.match(/^[\-\*\s]*(?:Branch\/Ref|Ref):\s*([\w\/\.\-]+)\s*$/im);
            const ref = refMatch ? refMatch[1].trim() : "devel";

            core.setOutput('repo', repoMatch[1]);
            core.setOutput('ref', ref || 'devel');
            core.setOutput('issue', String(context.issue.number));

      - name: Resolve checkout ref (fallback to repository default branch)
        id: resolve_ref
        uses: actions/github-script@v8
        with:
          script: |
            const [owner, repo] = '${{ steps.resolve.outputs.repo }}'.split('/');
            const requestedRef = '${{ steps.resolve.outputs.ref }}' || 'devel';

            let selectedRef = requestedRef;
            let fallbackUsed = false;

            try {
              await github.rest.repos.getBranch({ owner, repo, branch: requestedRef });
            } catch (e) {
              const repoInfo = await github.rest.repos.get({ owner, repo });
              selectedRef = repoInfo.data.default_branch;
              fallbackUsed = true;
            }

            core.setOutput('selected_ref', selectedRef);
            core.setOutput('fallback_used', String(fallbackUsed));

      - name: Initialize artifact and metadata files
        run: |
          : > check_results.txt
          : > bioccheck_results.txt
          : > coverage_summary.txt
          echo "{}" > coverage.json

          echo "${{ steps.resolve.outputs.issue }}" > issue_number.txt
          echo "${{ steps.resolve.outputs.repo }}" > target_repo.txt
          echo "${{ steps.resolve_ref.outputs.selected_ref }}" > target_ref.txt

          if [ "${{ steps.resolve_ref.outputs.fallback_used }}" = "true" ]; then
            echo "[INFO] Requested ref was not found; checkout used repository default branch." >> check_results.txt
          fi

      - name: Parse remotes from comment (optional)
        id: parse_remotes
        uses: actions/github-script@v8
        with:
          script: |
            if (context.eventName !== 'issue_comment') {
              core.setOutput('found_remotes', '');
              return;
            }

            const commentBody = context.payload.comment.body || '';
            const remotesMatch = commentBody.match(/^Remotes:\s*(.+)$/im);

            if (!remotesMatch) {
              core.setOutput('found_remotes', '');
              return;
            }

            core.setOutput('found_remotes', remotesMatch[1].trim());

      - name: Checkout target package
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.resolve.outputs.repo }}
          ref: ${{ steps.resolve_ref.outputs.selected_ref }}
          path: package

      - name: Install co-dependent remotes
        if: steps.parse_remotes.outputs.found_remotes != ''
        env:
          REMOTES_INPUT: ${{ steps.parse_remotes.outputs.found_remotes }}
        run: |
          deps <- trimws(strsplit(Sys.getenv("REMOTES_INPUT"), ",\\s*")[[1L]])
          deps <- deps[nzchar(deps)]
          if (length(deps) > 0) {
            message("Installing remotes: ", paste(deps, collapse = ", "))
            remotes::install_github(deps, upgrade = "never")
          }
        shell: Rscript {0}

      - name: Install build/check dependencies
        run: |
          BiocManager::install(c("BiocCheck", "rcmdcheck", "covr", "jsonlite", "remotes"), ask = FALSE, update = FALSE)
          remotes::install_deps("package", dependencies = TRUE, repos = BiocManager::repositories())
        shell: Rscript {0}

      - name: R CMD check
        continue-on-error: true
        env:
          _R_CHECK_CRAN_INCOMING_REMOTE_: false
        run: |
          check <- tryCatch(
            rcmdcheck::rcmdcheck("package", args = "--no-manual", error_on = "never", check_dir = "check"),
            error = function(e) {
              message("rcmdcheck failed: ", conditionMessage(e))
              NULL
            }
          )
          if (!is.null(check)) {
            sink("check_results.txt")
            print(check)
            sink()
          }
        shell: Rscript {0}

      - name: Test coverage
        continue-on-error: true
        run: |
          cov <- tryCatch(
            covr::package_coverage("package", quiet = FALSE, clean = FALSE, type = "all"),
            error = function(e) NULL
          )
          if (!is.null(cov)) {
            cov_list <- covr::coverage_to_list(cov)
            jsonlite::write_json(cov_list, "coverage.json", auto_unbox = TRUE, pretty = TRUE)
            pct <- round(covr::percent_coverage(cov), 2)
            writeLines(paste0("Total Coverage: ", pct, "%"), "coverage_summary.txt")
          }
        shell: Rscript {0}

      - name: Install GPG
        run: sudo apt-get update && sudo apt-get install -y gpg

      - name: Run BiocCheck
        continue-on-error: true
        run: |
          sink("bioccheck_results.txt")
          tryCatch(
            BiocCheck::BiocCheck("package", `quit-with-status` = TRUE, `no-check-bioc-help` = TRUE),
            error = function(e) message("BiocCheck error: ", conditionMessage(e))
          )
          sink()
        shell: Rscript {0}

      - name: Upload build-check results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-check-results
          path: |
            check_results.txt
            bioccheck_results.txt
            coverage.json
            coverage_summary.txt
          retention-days: 7
          if-no-files-found: warn

      - name: Upload build-check metadata artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-check-metadata
          path: |
            issue_number.txt
            target_repo.txt
            target_ref.txt
          retention-days: 7

      - name: Post build/check summary to issue
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const check = fs.existsSync('check_results.txt') ? fs.readFileSync('check_results.txt', 'utf8') : 'No check log found.';
            const bioc = fs.existsSync('bioccheck_results.txt') ? fs.readFileSync('bioccheck_results.txt', 'utf8') : 'No BiocCheck log found.';
            const cov = fs.existsSync('coverage_summary.txt') ? fs.readFileSync('coverage_summary.txt', 'utf8') : 'No coverage found.';

            const body = `### Build & Check Results\n\n**R CMD Check:**\n\`\`\`\n${check}\n\`\`\`\n\n**BiocCheck:**\n\`\`\`\n${bioc}\n\`\`\`\n\n**Coverage:**\n${cov}`;
            await github.rest.issues.createComment({
              issue_number: Number('${{ steps.resolve.outputs.issue }}'),
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

